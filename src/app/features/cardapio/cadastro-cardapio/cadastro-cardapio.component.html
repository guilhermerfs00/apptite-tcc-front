<div class="cadastro-cardapio-container">
  <h1>Cadastro de Cardápio</h1>
  <form (ngSubmit)="onSubmit()">
    <div class="input-group">
      <label for="nome">Nome do Cardápio</label>
      <input type="text" id="nome" [(ngModel)]="cardapioRequest.nome" name="nome" required>
    </div>
    <button type="submit" class="cadastro-button">Cadastrar</button>
  </form>
</div>
